<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản - E-Commerce</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        form {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #1e293b;
            margin-bottom: 20px;
        }
        fieldset {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        legend {
            font-weight: bold;
            padding: 0 10px;
            color: var(--primary-color);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #475569;
        }
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="password"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary-color);
            ring: 2px solid #bfdbfe;
        }
        .radio-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .radio-group label {
            display: inline;
            font-weight: normal;
        }
        .checkbox-group {
            margin: 20px 0;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button[type="submit"] {
            background-color: var(--primary-color);
            color: white;
        }
        button[type="reset"] {
            background-color: #e2e8f0;
            color: #475569;
        }
        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <form action="#" method="POST">
        <h1>Đăng Ký Tài Khoản</h1>

        <fieldset>
            <legend>Thông tin cá nhân</legend>
            
            <div class="form-group">
                <label for="fullname">Họ tên:</label>
                <input type="text" id="fullname" name="fullname" 
                       required minlength="2" maxlength="50" 
                       placeholder="Nguyễn Văn A">
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" 
                       required placeholder="example@gmail.com">
            </div>

            <div class="form-group">
                <label for="phone">Số điện thoại:</label>
                <input type="tel" id="phone" name="phone" 
                       pattern="[0-9]{10}" 
                       placeholder="0901234567 (10 chữ số)">
            </div>

            <div class="form-group">
                <label for="dob">Ngày sinh:</label>
                <input type="date" id="dob" name="dob" 
                       max="2026-04-30">
            </div>
        </fieldset>

        <fieldset>
            <legend>Tài khoản</legend>

            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" 
                       pattern="[A-Za-z0-9_]{3,20}" 
                       placeholder="Chỉ dùng chữ, số, gạch dưới (3-20 ký tự)">
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" 
                       required minlength="8" 
                       pattern="(?=.*\d)(?=.*[A-Z]).{8,}"
                       title="Ít nhất 8 ký tự, 1 chữ hoa, 1 chữ số"
                       placeholder="••••••••">
            </div>

            <div class="form-group">
                <label for="confirm_password">Xác nhận password:</label>
                <input type="password" id="confirm_password" name="confirm_password" 
                       required minlength="8"
                       placeholder="Nhập lại mật khẩu">
            </div>
        </fieldset>

        <fieldset>
            <legend>Thông tin giao hàng</legend>

            <div class="form-group">
                <label for="city">Thành phố:</label>
                <select id="city" name="city" required>
                    <option value="">-- Chọn Thành phố --</option>
                    <option value="HN">Hà Nội</option>
                    <option value="HCM">TP. Hồ Chí Minh</option>
                    <option value="DN">Đà Nẵng</option>
                    <option value="HP">Hải Phòng</option>
                    <option value="CT">Cần Thơ</option>
                </select>
            </div>

            <div class="form-group">
                <label for="district">Quận/Huyện:</label>
                <select id="district" name="district">
                    <option value="">-- Chọn Quận/Huyện --</option>
                    <option value="q1">Quận 1</option>
                    <option value="q2">Quận 2</option>
                    <option value="cg">Cầu Giấy</option>
                </select>
            </div>

            <div class="form-group">
                <label for="address">Địa chỉ chi tiết:</label>
                <textarea id="address" name="address" rows="3" 
                          placeholder="Số nhà, tên đường, phường/xã..."></textarea>
            </div>

            <div class="form-group">
                <label>Giới tính:</label>
                <div class="radio-group">
                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male">Nam</label>
                    
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Nữ</label>
                    
                    <input type="radio" id="other" name="gender" value="other">
                    <label for="other">Khác</label>
                </div>
            </div>
        </fieldset>

        <div class="checkbox-group">
            <label>
                <input type="checkbox" name="agree" required>
                Tôi đồng ý với các điều khoản và chính sách của hệ thống.
            </label>
        </div>

        <div class="btn-group">
            <button type="submit">Đăng ký ngay</button>
            <button type="reset">Nhập lại</button>
        </div>
    </form>

</body>
</html>
