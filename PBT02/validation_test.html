<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation Test - Câu A2 PBT02</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            line-height: 1.6;
        }
        h2 {
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #004494;
        }
        .instruction {
            color: #d9534f;
            font-size: 0.9em;
            margin-bottom: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h2>Kiểm tra HTML5 Validation</h2>
    <p class="instruction">
        * Mẹo chụp ảnh: Sửa cho input lỗi hiện tại trở thành hợp lệ thì mới Submit để xem được lỗi của input tiếp theo.
    </p>

    <form action="#" method="GET">
        
        <!-- Trường hợp 1 -->
        <div class="form-group">
            <label for="case1">Trường hợp 1 (required - Bỏ trống):</label>
            <input type="text" id="case1" name="case1" required value="">
        </div>

        <!-- Trường hợp 2 -->
        <div class="form-group">
            <label for="case2">Trường hợp 2 (email - Nhập "abc"):</label>
            <input type="email" id="case2" name="case2" value="abc">
        </div>

        <!-- Trường hợp 3 -->
        <div class="form-group">
            <label for="case3">Trường hợp 3 (number, min=1, max=10 - Nhập "15"):</label>
            <input type="number" id="case3" name="case3" min="1" max="10" value="15">
        </div>

        <!-- Trường hợp 4 -->
        <div class="form-group">
            <label for="case4">Trường hợp 4 (pattern regex - Nhập "abc123"):</label>
            <input type="text" id="case4" name="case4" pattern="[0-9]{10}" value="abc123">
        </div>

        <!-- Trường hợp 5 -->
        <div class="form-group">
            <label for="case5">Trường hợp 5 (minlength=8 - Nhập "123"):</label>
            <input type="password" id="case5" name="case5" minlength="8" value="123">
        </div>

        <button type="submit">Submit để kiểm tra Validation</button>

    </form>

</body>
</html>
